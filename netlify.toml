# Netlify configuration — Next.js (App Router, SSR)
# Netlify détecte Next.js automatiquement et provisionne l'adaptateur OpenNext
# (zéro config recommandée par Netlify : on NE fige PAS l'adaptateur, on NE
# définit PAS de "publish" — l'adaptateur s'en charge).

[build]
  # Install propre et déterministe AVANT le build.
  # Le cache Netlify réutilisait un node_modules périmé (issu d'une ancienne
  # config avec @netlify/plugin-nextjs figé) -> "Cannot find module 'autoprefixer'".
  # On purge node_modules et on réinstalle strictement depuis package-lock.json
  # (npm ci) pour garantir que TOUTES les dépendances de build sont présentes.
  command = "rm -rf node_modules && npm ci --legacy-peer-deps && npm run build"
  # PAS de "publish" : l'adaptateur Next.js de Netlify (OpenNext) configure
  # lui-même le répertoire de publication. Le forcer (.next ou public) casse
  # le routing (toutes les routes en 404).

[build.environment]
  NODE_VERSION = "20"

# En-têtes de sécurité (ceux de next.config.js s'appliquent aussi)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
