# Netlify configuration — Next.js (App Router, SSR)

[build]
  # Install propre et déterministe AVANT le build.
  # Le cache Netlify réutilisait un node_modules périmé -> "Cannot find module
  # 'autoprefixer'". On purge node_modules et on réinstalle strictement depuis
  # package-lock.json (npm ci) pour garantir toutes les deps de build.
  command = "rm -rf node_modules && npm ci --legacy-peer-deps && npm run build"
  # PAS de "publish" ici : l'adaptateur Next.js ci-dessous configure lui-même
  # le répertoire de publication (et le surcharge par rapport au réglage UI).

# Active explicitement l'adaptateur Next.js de Netlify (OpenNext).
# Indispensable : sans cette déclaration, l'adaptateur ne s'exécutait pas, et
# Netlify publiait le dossier public/ (vide depuis la suppression des HTML
# statiques) -> 404 sur toutes les routes. Le déclarer ici force Netlify à
# l'installer + l'exécuter et à surcharger le "publish: public" figé dans l'UI.
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# En-têtes de sécurité (ceux de next.config.js s'appliquent aussi)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
